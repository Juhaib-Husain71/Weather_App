<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="weather.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Weather's info.com</title>
</head>
<body>
    
<div class="navbar">
    <div class="bar">
        <i class="fa-solid fa-bars"></i>
    </div>

    <div class="search">
        <input type="text" placeholder="search city">
        <div class="search-icon">
            <i class="fa-solid fa-magnifying-glass"></i>
        </div>
    </div>
</div>

<div class="hero-sec1">
    <div class="city">
        <p>Country</p>
        <p>State</p>
    </div>

    <div class="date">
        <p>Day, Month, Date</p>
    </div>

    <div class="temp">
        <div class="temp-icon">
            <img id="weatherIcon" src="images/sun.png">
        </div>
        <div class="temp-num">
            <p class="num-msg0"><sup>o</sup>C</p>
            <p class="num-msg1"></p>
            <p class="num-msg2"></p>
        </div>
    </div>
</div>

<div class="hero-sec2">
    <div class="slide">
        <div class="s-icon" style="background-image: url('images/rainfall.png');"></div>
        <div class="s-msg1">RainFall</div>
        <div class="s-msg2">---</div>
    </div>

    <div class="slide">
        <div class="s-icon" style="background-image: url('images/wind.png');"></div>
        <div class="s-msg1">Wind</div>
        <div class="s-msg2">---</div>
    </div>

    <div class="slide">
        <div class="s-icon" style="background-image: url('images/humidity.png');"></div>
        <div class="s-msg1">Humidity</div>
        <div class="s-msg2">---</div>
    </div>
</div>
